<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#1e1e2f;
      font-family:Arial;
    }

    .calculator{
      background:#2c2c3e;
      padding:20px;
      border-radius:15px;
    }

    #screen{
        width: 100%;
        height: 55px;
        font-size: 22px;
        text-align: right;
        margin-bottom:10px;
        border:none;
        padding-right: 10px;
    }

    .buttons{
        display: grid;
        grid-template-columns: repeat(4, 65px);
        gap: 10px;
    }

    button{
        height: 55px;
        border:none;
        border-radius: 10px;
        font-size: 18px;
        cursor:pointer;
        background:#3b3b55;
        color:white;
    }

    button:hover{
        background: #5a5a80;
    }

    .op{
      background:#ff9800;
    }

    .ac{
      background:red;
    }

    .equal{
      background:green;
    }

    .zero{
      grid-column: span 2;
    }


    
  </style>
</head>

<body>

<div class="calculator">

  <input type="text" id="screen" readonly>

  <div class="buttons">

    <!-- Row 1 -->
    <button class="ac" onclick="clearAll()">AC</button>
    <button class="op" onclick="del()">⌫</button>
    <button class="op" onclick="add('/')">/</button>
    <button class="op" onclick="add('*')">*</button>

    <!-- Row 2 -->
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button class="op" onclick="add('-')">-</button>

    <!-- Row 3 -->
    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button class="op" onclick="add('+')">+</button>

    <!-- Row 4 -->
    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <!-- Row 5 -->
    <button class="zero" onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>

  </div>

</div>

<script>

let screen = document.getElementById("screen");

function add(v){
  screen.value += v;
}

function calculate(){
  screen.value = eval(screen.value);
}

function clearAll(){
  screen.value = "";
}

function del(){
  screen.value = screen.value.slice(0,-1);
}

document.addEventListener("keydown", function(e){

  let key = e.key;

  if("0123456789+-*/.".includes(key)){
    screen.value += key;
  }
  else if(key === "Enter"){
    screen.value = eval(screen.value);
  }
  else if(key === "Backspace"){
    screen.value = screen.value.slice(0,-1);
  }
  else if(key === "Escape"){
    screen.value = "";
  }

});

</script>

</body>
</html>
